<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE Quiz</title>

<style>
body{
  background:#0c0c0e;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}
input,button{
  padding:10px;
  margin:8px;
}
.opt{
  display:block;
  margin:8px auto;
  width:80%;
}
</style>
</head>

<body>

<h1>DE Quiz (Offline)</h1>

<div id="entry">
  <input id="name" placeholder="Enter your name"><br>
  <button onclick="start()">Start Quiz</button>
  <button onclick="showLB()">Leaderboard</button>
</div>

<div id="quiz" style="display:none">
  <h3 id="q"></h3>
  <p id="math"></p>
  <div id="opts"></div>
  <button id="next" onclick="nextQ()" style="display:none">Next</button>
</div>

<div id="result" style="display:none">
  <h2 id="score"></h2>
  <h3 id="grade"></h3>
  <button onclick="showLB()">View Leaderboard</button>
</div>

<div id="lb" style="display:none">
  <h2>Leaderboard</h2>
  <div id="lbdata"></div>
  <button onclick="back()">Back</button>
</div>

<script>

// CONFIG
const TOTAL = 15;
const LB_KEY = "quiz_lb";

// 🔥 50 QUESTIONS
const QUESTION_BANK = [
{topic:"Order",question:"Find order",math:"d²y/dx² + y = 0",options:["1","2","3","0"],answer:1},
{topic:"Order",question:"Find order",math:"d³y/dx³ + dy/dx = 0",options:["1","2","3","0"],answer:2},
{topic:"Degree",question:"Find degree",math:"(d²y/dx²)² + y = 0",options:["1","2","3","0"],answer:1},
{topic:"Degree",question:"Find degree",math:"(d²y/dx²)³ + y = 0",options:["1","2","3","0"],answer:2},
{topic:"Order",question:"Order?",math:"(dy/dx)^2 + y = 0",options:["1","2","3","0"],answer:0},

{topic:"Formation",question:"Eliminate C",math:"y = Cx",options:["dy/dx=C","dy/dx=y/x","x","none"],answer:1},
{topic:"Formation",question:"Eliminate C",math:"y = Ce^x",options:["dy/dx=y","x","C","none"],answer:0},
{topic:"Formation",question:"Eliminate C",math:"y = Cx²",options:["dy/dx=2y/x","dy/dx=x","y=x²","none"],answer:0},
{topic:"Formation",question:"Eliminate C",math:"y = C sin x",options:["dy/dx=y cot x","dy/dx=cos x","y=x","none"],answer:0},
{topic:"Formation",question:"Eliminate C",math:"y = C ln x",options:["dy/dx=y/x ln x","dy/dx=1/x","y=x","none"],answer:0},

{topic:"Separation",question:"Solve",math:"dy/dx = y",options:["Ce^x","x²","lnx","Cx"],answer:0},
{topic:"Separation",question:"Solve",math:"dy/dx = x",options:["x²/2 + C","Ce^x","lnx","Cx"],answer:0},
{topic:"Separation",question:"Solve",math:"dy/dx = xy",options:["Ce^(x²/2)","Ce^x","x²","lnx"],answer:0},
{topic:"Separation",question:"Solve",math:"dy/dx = y/x",options:["Cx","Ce^x","x²","lnx"],answer:0},
{topic:"Separation",question:"Solve",math:"dy/dx = x²y",options:["Ce^(x³/3)","Ce^x","x³","lnx"],answer:0},
{topic:"Separation",question:"Solve",math:"dy/dx = y²",options:["-1/y = x + C","Ce^x","x²","lnx"],answer:0},
{topic:"Separation",question:"Solve",math:"dy/dx = 1/x",options:["lnx + C","Ce^x","x²","y=x"],answer:0},
{topic:"Separation",question:"Solve",math:"dy/dx = e^x",options:["e^x + C","lnx","x²","Cx"],answer:0},
{topic:"Separation",question:"Solve",math:"dy/dx = cos x",options:["sin x + C","cos x","lnx","Cx"],answer:0},
{topic:"Separation",question:"Solve",math:"dy/dx = sec²x",options:["tan x + C","cos x","lnx","Cx"],answer:0},

{topic:"Homogeneous",question:"Substitution?",math:"dy/dx=(x+y)/x",options:["y=vx","y=x²","lnx","none"],answer:0},
{topic:"Homogeneous",question:"Identify",math:"dy/dx=y/x",options:["Homogeneous","Exact","Linear","None"],answer:0},
{topic:"Homogeneous",question:"Identify",math:"dy/dx=(x²+y²)/(xy)",options:["Homogeneous","Exact","Linear","None"],answer:0},
{topic:"Homogeneous",question:"Substitution?",math:"dy/dx=(x-y)/x",options:["y=vx","y=x²","lnx","none"],answer:0},
{topic:"Homogeneous",question:"Identify",math:"dy/dx=(x+y)/(x-y)",options:["Homogeneous","Exact","Linear","None"],answer:0},
{topic:"Homogeneous",question:"Substitution?",math:"dy/dx=(2x+y)/x",options:["y=vx","y=x²","lnx","none"],answer:0},
{topic:"Homogeneous",question:"Identify",math:"dy/dx=(y/x)+1",options:["Homogeneous","Exact","Linear","None"],answer:0},
{topic:"Homogeneous",question:"Substitution?",math:"dy/dx=(y-2x)/x",options:["y=vx","y=x²","lnx","none"],answer:0},
{topic:"Homogeneous",question:"Identify",math:"dy/dx=(x²-y²)/(xy)",options:["Homogeneous","Exact","Linear","None"],answer:0},
{topic:"Homogeneous",question:"Substitution?",math:"dy/dx=(x+2y)/x",options:["y=vx","y=x²","lnx","none"],answer:0},

{topic:"Exact",question:"Check",math:"(2x+y)dx + xdy = 0",options:["Exact","Not exact","Linear","None"],answer:0},
{topic:"Exact",question:"Check",math:"(y+x)dx + (x+y)dy = 0",options:["Exact","Not exact","Linear","None"],answer:0},
{topic:"Exact",question:"Check",math:"(y+x²)dx + xdy = 0",options:["Exact","Not exact","Linear","None"],answer:1},
{topic:"Exact",question:"Check",math:"(2xy)dx + x²dy = 0",options:["Exact","Not exact","Linear","None"],answer:0},
{topic:"Exact",question:"Check",math:"(y²+x)dx + ydy = 0",options:["Exact","Not exact","Linear","None"],answer:1},
{topic:"Exact",question:"Check",math:"(3x²y)dx + x³dy = 0",options:["Exact","Not exact","Linear","None"],answer:0},
{topic:"Exact",question:"Check",math:"(y+x³)dx + 3x²y dy = 0",options:["Exact","Not exact","Linear","None"],answer:1},
{topic:"Exact",question:"Check",math:"(x+y²)dx + 2xy dy = 0",options:["Exact","Not exact","Linear","None"],answer:0},
{topic:"Exact",question:"Check",math:"(y+x)dx + x dy = 0",options:["Exact","Not exact","Linear","None"],answer:1},
{topic:"Exact",question:"Check",math:"(2x+y²)dx + 2xy dy = 0",options:["Exact","Not exact","Linear","None"],answer:0}
];

// STATE
let qs=[],i=0,score=0,name="";

// START
function start(){
  name=document.getElementById("name").value.trim();
  if(!name) return;

  qs = QUESTION_BANK.sort(()=>Math.random()-0.5).slice(0,TOTAL);
  i=0; score=0;

  show("quiz");
  render();
}

// RENDER
function render(){
  let q=qs[i];
  document.getElementById("q").innerText=q.question;
  document.getElementById("math").innerText=q.math;

  let box=document.getElementById("opts");
  box.innerHTML="";

  q.options.forEach((o,idx)=>{
    let b=document.createElement("button");
    b.className="opt";
    b.innerText=o;
    b.onclick=()=>select(idx);
    box.appendChild(b);
  });

  document.getElementById("next").style.display="none";
}

// SELECT
function select(ans){
  if(ans===qs[i].answer) score++;
  document.getElementById("next").style.display="block";
}

// NEXT
function nextQ(){
  i++;
  if(i>=qs.length) finish();
  else render();
}

// FINISH
function finish(){
  let pct = (score/qs.length)*100;
  let g = grade(pct);

  saveScore(name,score,qs.length);

  document.getElementById("score").innerText=`${score}/${qs.length}`;
  document.getElementById("grade").innerText=`Grade: ${g}`;

  show("result");
}

// GRADE
function grade(p){
  if(p>=70) return "A";
  if(p>=60) return "B";
  if(p>=50) return "C";
  if(p>=45) return "D";
  return "F";
}

// LEADERBOARD
function saveScore(n,s,t){
  let lb=JSON.parse(localStorage.getItem(LB_KEY)||"[]");
  lb.push({n,s,t,g:grade((s/t)*100)});
  lb.sort((a,b)=>b.s-a.s);
  localStorage.setItem(LB_KEY,JSON.stringify(lb));
}

function showLB(){
  show("lb");
  let lb=JSON.parse(localStorage.getItem(LB_KEY)||"[]");
  let d=document.getElementById("lbdata");
  d.innerHTML="";

  lb.forEach((p,i)=>{
    let div=document.createElement("div");
    div.innerText=`${i+1}. ${p.n} - ${p.s}/${p.t} (${p.g})`;
    d.appendChild(div);
  });
}

// NAV
function show(id){
  ["entry","quiz","result","lb"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

function back(){ show("entry"); }

</script>

</body>
</html>
